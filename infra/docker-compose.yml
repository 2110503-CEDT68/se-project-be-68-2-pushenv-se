name: job_fair

services:
  postgres:
    image: postgres:18-alpine
    container_name: job_fair_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-job_fair}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - job_fair_network

  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: job_fair_backend
    environment:
      - PORT=${PORT:-4000}
      - DATABASE_URL=${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-job_fair}}
      - JWT_SECRET=${JWT_SECRET:-production-super-secret-key-change-me}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost:3000}
      - SEED_ADMIN_EMAIL=${SEED_ADMIN_EMAIL:-admin@jobfair.com}
      - SEED_ADMIN_PASSWORD=${SEED_ADMIN_PASSWORD:-password123}
    ports:
      - "${PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_started
    restart: unless-stopped
    networks:
      - job_fair_network
    # Run prisma db push and seed admin before starting the server
    command: sh -c "npx prisma db push --accept-data-loss && npx tsx prisma/seed.ts --admin && node dist/server.js"

  frontend:
    build:
      context: ../../se-project-fe-68-2-pushenv-se
      dockerfile: Dockerfile
      args:
        # Build-time argument for Next.js to bake the API URL into the frontend build
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:4000}
    container_name: job_fair_frontend
    environment:
      - PORT=${FRONTEND_PORT:-3000}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - job_fair_network

volumes:
  postgres_data:

networks:
  job_fair_network:
    driver: bridge
