    "/admin/events/{id}/publish": {
      "patch": {
        "summary": "Toggle event publish state",
        "description": "No request body needed. If the event is published it becomes unpublished, and vice versa.\n",
        "tags": [
          "Admin - Events"
        ],
        "security": [
          {
            "cookieAuth": [],
            "csrfToken": []
          }
        ],
        "parameters": [
          {
            "$ref": "#/components/parameters/EventId"
          }
        ],
        "responses": {
          "200": {
            "description": "Event publish state toggled",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/SuccessResponse"
                },
                "example": {
                  "success": true,
                  "message": "Event published",
                  "data": {
                    "id": "event-uuid",
                    "isPublished": true
                  }
                }
              }
            }
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
