    "/admin/events": {
      "get": {
        "summary": "Get all events including unpublished drafts (paginated)",
        "tags": [
          "Admin - Events"
        ],
        "security": [
          {
            "cookieAuth": []
          }
        ],
        "parameters": [
          {
            "in": "query",
            "name": "name",
            "schema": {
              "type": "string"
            },
            "description": "Filter by event name (case-insensitive)"
          },
          {
            "in": "query",
            "name": "date",
            "schema": {
              "type": "string",
              "format": "date"
            },
            "description": "Filter by exact startDate (e.g. 2025-11-01)"
          },
          {
            "in": "query",
            "name": "page",
            "schema": {
              "type": "integer",
              "default": 1
            }
          },
          {
            "in": "query",
            "name": "limit",
            "schema": {
              "type": "integer",
              "default": 10,
              "maximum": 100
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Paginated events with registration and company counts",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/SuccessResponse"
                },
                "example": {
                  "success": true,
                  "message": "All events",
                  "data": {
                    "data": [
                      {
                        "id": "event-uuid",
                        "name": "Job Fair 2025",
                        "isPublished": false,
                        "_count": {
                          "registrations": 42,
                          "companies": 10
                        }
                      }
                    ],
                    "total": 1,
                    "page": 1,
                    "limit": 10,
                    "totalPages": 1
                  }
                }
              }
            }
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
          },
          "403": {
            "$ref": "#/components/responses/Forbidden"
          }
        }
      },
      "post": {
        "summary": "Create a new event (draft by default)",
        "description": "New events are always created with isPublished = false. Use PATCH /publish to publish.",
        "tags": [
          "Admin - Events"
        ],
        "security": [
          {
            "cookieAuth": [],
            "csrfToken": []
          }
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "required": [
                  "name",
                  "description",
                  "location",
                  "startDate",
                  "endDate"
                ],
                "properties": {
                  "name": {
                    "type": "string",
                    "example": "Job Fair 2025"
                  },
                  "description": {
                    "type": "string",
                    "example": "Annual tech job fair in Bangkok"
                  },
                  "location": {
                    "type": "string",
                    "example": "BITEC Bangkok"
                  },
                  "startDate": {
                    "type": "string",
                    "format": "date",
                    "example": "2025-11-01"
                  },
                  "endDate": {
                    "type": "string",
                    "format": "date",
                    "example": "2025-11-02"
                  },
                  "banner": {
                    "type": "string",
                    "description": "Banner image URL (optional)"
                  }
                }
              }
            }
          }
        },
        "responses": {
          "201": {
            "description": "Event created",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/SuccessResponse"
                }
              }
            }
          },
          "400": {
            "description": "Missing required fields",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ErrorResponse"
                }
              }
            }
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
          },
          "403": {
            "$ref": "#/components/responses/Forbidden"
          }
        }
      }
    },
