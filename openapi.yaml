{
  "openapi": "3.0.0",
  "info": {
    "title": "Job Fair API",
    "version": "1.0.0",
    "description": "Backend API for the Job Fair platform. Roles: jobSeeker, companyUser, systemAdmin."
  },
  "servers": [
    {
      "url": "http://localhost:4000/api/v1",
      "description": "Local development"
    }
  ],
  "tags": [
    {
      "name": "Auth",
      "description": "Authentication — all roles"
    },
    {
      "name": "System",
      "description": "Operational and documentation endpoints"
    },
    {
      "name": "Users",
      "description": "Job seeker profile and registrations"
    },
    {
      "name": "Events",
      "description": "Public event discovery and registration"
    },
    {
      "name": "Companies",
      "description": "Public company directory"
    },
    {
      "name": "Company",
      "description": "Company user — manage profile and jobs"
    },
    {
      "name": "Jobs",
      "description": "Public job listings"
    },
    {
      "name": "Admin - Accounts",
      "description": "System admin — user account management"
    },
    {
      "name": "Admin - Companies",
      "description": "System admin — company profile management"
    },
    {
      "name": "Admin - Events",
      "description": "System admin — event management"
    },
    {
      "name": "Admin - Jobs",
      "description": "System admin — job listing management"
    }
  ],
  "paths": {
    "/csrf-token": {
      "get": {
        "summary": "Generate a CSRF token for subsequent write requests",
        "tags": [
          "System"
        ],
        "security": [],
        "responses": {
          "200": {
            "description": "CSRF token issued",
            "content": {
              "application/json": {
                "schema": {
                  "type": "object",
                  "properties": {
                    "csrfToken": {
                      "type": "string"
                    }
                  }
                }
              }
            }
          }
        }
      }
    },
    "/openapi.json": {
      "get": {
        "summary": "Get the runtime-generated OpenAPI document",
        "tags": [
          "System"
        ],
        "security": [],
        "responses": {
          "200": {
            "description": "OpenAPI document"
          }
        }
      }
    },
    "/health": {
      "get": {
        "summary": "Health check",
        "tags": [
          "System"
        ],
        "security": [],
        "responses": {
          "200": {
            "description": "Service is healthy",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/SuccessResponse"
                }
              }
            }
          }
        }
      }
    },
    "/admin/accounts": {
      "get": {
        "summary": "Get all user accounts (paginated, filterable)",
        "tags": [
          "Admin - Accounts"
        ],
        "security": [
          {
            "cookieAuth": []
          }
        ],
        "parameters": [
          {
            "in": "query",
            "name": "name",
            "schema": {
              "type": "string"
            },
            "description": "Filter by name (case-insensitive partial match)"
          },
          {
            "in": "query",
            "name": "role",
            "schema": {
              "type": "string",
              "enum": [
                "jobSeeker",
                "companyUser",
                "systemAdmin"
              ]
            },
            "description": "Filter by role"
          },
          {
            "in": "query",
            "name": "page",
            "schema": {
              "type": "integer",
              "default": 1
            }
          },
          {
            "in": "query",
            "name": "limit",
            "schema": {
              "type": "integer",
              "default": 10,
              "maximum": 100
            }
          }
        ],
        "responses": {
          "200": {
            "description": "Paginated list of user accounts",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/SuccessResponse"
                },
                "example": {
                  "success": true,
                  "message": "All accounts",
                  "data": {
                    "data": [
                      {
                        "id": "user-uuid",
                        "name": "John Doe",
                        "email": "john@example.com",
                        "role": "jobSeeker",
                        "phone": null,
                        "avatar": null,
                        "createdAt": "2024-01-01T00:00:00Z"
                      }
                    ],
                    "total": 1,
                    "page": 1,
                    "limit": 10,
                    "totalPages": 1
                  }
                }
              }
            }
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
          },
          "403": {
            "$ref": "#/components/responses/Forbidden"
          }
        }
      },
      "post": {
        "summary": "Create a new account (companyUser or jobSeeker)",
        "description": "Creating a companyUser account automatically creates a CompanyProfile record linked to that user.\n",
        "tags": [
          "Admin - Accounts"
        ],
        "security": [
          {
            "cookieAuth": [],
            "csrfToken": []
          }
        ],
        "requestBody": {
          "required": true,
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "required": [
                  "name",
                  "email",
                  "password",
                  "role"
                ],
                "properties": {
                  "name": {
                    "type": "string",
                    "example": "Tech Corp"
                  },
                  "email": {
                    "type": "string",
                    "format": "email",
                    "example": "hr@techcorp.com"
                  },
                  "password": {
                    "type": "string",
                    "example": "pass1234"
                  },
                  "role": {
                    "type": "string",
                    "enum": [
                      "jobSeeker",
                      "companyUser"
                    ],
                    "example": "companyUser"
                  }
                }
              }
            }
          }
        },
        "responses": {
          "201": {
            "description": "Account created — returns User.id (not CompanyProfile.id)",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/SuccessResponse"
                },
                "example": {
                  "success": true,
                  "message": "Account created",
                  "data": {
                    "id": "user-uuid",
                    "name": "Tech Corp",
                    "email": "hr@techcorp.com",
                    "role": "companyUser"
                  }
                }
              }
            }
          },
          "400": {
            "description": "Missing required fields or invalid role",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ErrorResponse"
                }
              }
            }
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
          },
          "403": {
            "$ref": "#/components/responses/Forbidden"
          },
          "409": {
            "description": "Email already in use",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ErrorResponse"
                }
              }
            }
          }
        }
      }
    },
    "/admin/accounts/{id}": {
      "get": {
        "summary": "Get one account with related profile data",
        "tags": [
          "Admin - Accounts"
        ],
        "security": [
          {
            "cookieAuth": []
          }
        ],
        "parameters": [
          {
            "in": "path",
            "name": "id",
            "required": true,
            "schema": {
              "type": "string",
              "format": "uuid"
            },
            "description": "User ID"
          }
        ],
        "responses": {
          "200": {
            "description": "Account details",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/SuccessResponse"
                }
              }
            }
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
          },
          "403": {
            "$ref": "#/components/responses/Forbidden"
          },
          "404": {
            "description": "Account not found",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ErrorResponse"
                }
              }
            }
          }
        }
      },
      "put": {
        "summary": "Update any account — optionally reset password",
        "description": "All fields are optional. Provide password to reset it.",
        "tags": [
          "Admin - Accounts"
        ],
        "security": [
          {
            "cookieAuth": [],
            "csrfToken": []
          }
        ],
        "parameters": [
          {
            "in": "path",
            "name": "id",
            "required": true,
            "schema": {
              "type": "string",
              "format": "uuid"
            },
            "description": "User ID"
          }
        ],
        "requestBody": {
          "content": {
            "application/json": {
              "schema": {
                "type": "object",
                "properties": {
                  "name": {
                    "type": "string"
                  },
                  "email": {
                    "type": "string",
                    "format": "email"
                  },
                  "phone": {
                    "type": "string"
                  },
                  "password": {
                    "type": "string",
                    "description": "If provided, the account password is reset to this value"
                  }
                }
              }
            }
          }
        },
        "responses": {
          "200": {
            "description": "Account updated",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/SuccessResponse"
                }
              }
            }
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
          },
          "403": {
            "$ref": "#/components/responses/Forbidden"
          },
          "404": {
            "description": "Account not found",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ErrorResponse"
                }
              }
            }
          },
          "409": {
            "description": "Email already in use by another account",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ErrorResponse"
                }
              }
            }
          }
        }
      },
      "delete": {
        "summary": "Delete any account",
        "description": "Admin cannot delete their own account.",
        "tags": [
          "Admin - Accounts"
        ],
        "security": [
          {
            "cookieAuth": [],
            "csrfToken": []
          }
        ],
        "parameters": [
          {
            "in": "path",
            "name": "id",
            "required": true,
            "schema": {
              "type": "string",
              "format": "uuid"
            },
            "description": "User ID"
          }
        ],
        "responses": {
          "200": {
            "description": "Account deleted",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/SuccessResponse"
                },
                "example": {
                  "success": true,
                  "message": "Account deleted",
                  "data": null
                }
              }
            }
          },
          "400": {
            "description": "Cannot delete your own account",
            "content": {
              "application/json": {
                "schema": {
                  "$ref": "#/components/schemas/ErrorResponse"
                }
              }
            }
          },
          "401": {
            "$ref": "#/components/responses/Unauthorized"
          },
          "403": {
            "$ref": "#/components/responses/Forbidden"
          },
          "404": {
            "$ref": "#/components/responses/NotFound"
          }
        }
      }
    },
    "/admin/companies": {
      "get": {
        "summary": "Get all company profiles (paginated, filterable)",
        "tags": [
