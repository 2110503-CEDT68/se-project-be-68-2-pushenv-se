      "SuccessResponse": {
        "type": "object",
        "properties": {
          "success": {
            "type": "boolean",
            "example": true
          },
          "message": {
            "type": "string",
            "example": "Operation successful"
          },
          "data": {
            "description": "Varies by endpoint"
          }
        }
      },
      "ErrorResponse": {
        "type": "object",
        "properties": {
          "success": {
            "type": "boolean",
            "example": false
          },
          "message": {
            "type": "string",
            "example": "Error description"
          }
        }
      },
      "AuthSessionResponse": {
        "type": "object",
        "properties": {
          "success": {
            "type": "boolean",
            "example": true
          },
          "message": {
            "type": "string",
            "example": "Login successful"
          },
          "data": {
            "type": "object",
            "properties": {
              "user": {
                "type": "object",
                "properties": {
                  "id": {
                    "type": "string",
                    "format": "uuid"
                  },
                  "role": {
                    "type": "string",
                    "enum": [
                      "jobSeeker",
                      "companyUser",
                      "systemAdmin"
                    ]
                  }
                }
              }
            }
          }
        }
      },
      "JobInput": {
        "type": "object",
        "required": [
          "title",
          "type",
          "location",
          "description"
        ],
        "properties": {
          "title": {
            "type": "string",
            "example": "Frontend Developer"
          },
          "type": {
            "type": "string",
            "enum": [
              "full_time",
              "part_time",
              "internship",
              "contract"
            ],
            "example": "full_time"
          },
          "location": {
            "type": "string",
            "example": "Bangkok"
          },
          "description": {
            "type": "string",
            "example": "Build amazing UIs for our platform"
          },
          "requirements": {
            "type": "string",
            "example": "3+ years of React experience"
          },
          "qualifications": {
            "type": "string",
            "example": "Bachelor degree in Computer Science"
          },
          "salary": {
            "type": "string",
            "example": "50,000 THB"
          },
          "attachment": {
            "type": "string",
            "description": "URL to job description PDF"
          }
        }
      }
    },
    "responses": {
      "Unauthorized": {
        "description": "Missing or invalid session cookie",
        "content": {
          "application/json": {
            "schema": {
              "$ref": "#/components/schemas/ErrorResponse"
            },
            "example": {
              "success": false,
              "message": "Unauthorized"
            }
          }
        }
      },
      "Forbidden": {
        "description": "Authenticated but wrong role for this endpoint",
        "content": {
          "application/json": {
            "schema": {
              "$ref": "#/components/schemas/ErrorResponse"
            },
            "example": {
              "success": false,
              "message": "Forbidden"
            }
          }
        }
      },
      "NotFound": {
        "description": "Resource not found",
        "content": {
          "application/json": {
            "schema": {
              "$ref": "#/components/schemas/ErrorResponse"
            },
            "example": {
              "success": false,
              "message": "Not found"
            }
          }
        }
      }
    }
  }
}
